# 本地开发用 PostgreSQL：docker compose up -d
# 然后在 .env 中设置下方 DATABASE_URL
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbcnet
    ports:
      - "5432:5432"
    volumes:
      - dbcnet_pgdata:/var/lib/postgresql/data

volumes:
  dbcnet_pgdata:
